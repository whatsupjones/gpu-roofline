name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (no GPU features)
        run: cargo build --no-default-features

      - name: Build (with wgpu)
        run: cargo build

      - name: Run tests (simulation only — no GPU needed)
        run: cargo test

      - name: Build (with vgpu feature)
        run: cargo build --features vgpu

      - name: Test (with vgpu feature)
        run: cargo test --features vgpu

      - name: Build gpu-fleet
        run: cargo build -p gpu-fleet

      - name: Test gpu-fleet
        run: cargo test -p gpu-fleet

      - name: Build (with enterprise feature)
        run: cargo build --features enterprise -p gpu-roofline

      - name: Test (with enterprise feature)
        run: cargo test --features enterprise -p gpu-roofline

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (with vgpu feature)
        run: cargo clippy --features vgpu --all-targets -- -D warnings

      - name: Clippy gpu-fleet
        run: cargo clippy -p gpu-fleet --all-targets -- -D warnings

      - name: Clippy (with enterprise feature)
        run: cargo clippy --features enterprise -p gpu-roofline --all-targets -- -D warnings
