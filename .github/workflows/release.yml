name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build gpu-roofline
        run: cargo build --release --target ${{ matrix.target }} -p gpu-roofline

      - name: Build gpu-fleet
        run: cargo build --release --target ${{ matrix.target }} -p gpu-fleet

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gpu-roofline dist/
          cp target/${{ matrix.target }}/release/gpu-fleet dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/ 2>/dev/null || true
          cd dist
          tar czf ../gpu-roofline-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/gpu-roofline.exe dist/
          Copy-Item target/${{ matrix.target }}/release/gpu-fleet.exe dist/
          Copy-Item README.md dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath gpu-roofline-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-roofline-${{ matrix.target }}
          path: gpu-roofline-${{ github.ref_name }}-${{ matrix.target }}.*

  build-cuda:
    name: Build CUDA (Linux x86_64)
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.4.0-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y curl gcc pkg-config libssl-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build gpu-roofline with CUDA
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --features cuda -p gpu-roofline

      - name: Build gpu-fleet with CUDA
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --features cuda -p gpu-fleet

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/gpu-roofline dist/
          cp target/release/gpu-fleet dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/ 2>/dev/null || true
          cd dist
          tar czf ../gpu-roofline-${{ github.ref_name }}-x86_64-linux-cuda.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-roofline-x86_64-linux-cuda
          path: gpu-roofline-${{ github.ref_name }}-x86_64-linux-cuda.tar.gz

  release:
    name: Create Release
    needs: [build, build-cuda]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
