apiVersion: v1
kind: Service
metadata:
  name: gpu-roofline-metrics
  namespace: gpu-monitoring
  labels:
    app: gpu-roofline
    component: monitor
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9835
      targetPort: metrics
      protocol: TCP
  selector:
    app: gpu-roofline
