<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>$title$</title>
<style>
/* Base typography */
body {
  font-family: "Times New Roman", "Noto Serif", Georgia, serif;
  font-size: 11pt;
  line-height: 1.5;
  color: #111;
  max-width: 7.5in;
  margin: 0 auto;
  padding: 0.5in;
}

/* Print page setup */
@page {
  size: letter;
  margin: 1in 1in 1.2in 1in;
}

/* Title page: numbered as page 1 */
@page title-page {
  @bottom-center {
    content: counter(page);
    font-family: "Times New Roman", serif;
    font-size: 10pt;
  }
}

/* TOC pages: no page number */
@page toc-page {
  @bottom-center {
    content: none;
  }
}

/* Body pages: numbered at bottom center */
@page body-page {
  @bottom-center {
    content: counter(page);
    font-family: "Times New Roman", serif;
    font-size: 10pt;
  }
}

/* Section assignments */
.title-page {
  page: title-page;
  page-break-after: always;
  text-align: center;
  padding-top: 2in;
}

.toc-section {
  page: toc-page;
  page-break-after: always;
}

.body-content {
  page: body-page;
}

/* Title page styling */
.title-page h1 {
  font-size: 18pt;
  margin-bottom: 0.5em;
  border-bottom: none;
}

.title-page .author {
  font-size: 12pt;
  margin-top: 1em;
  margin-bottom: 0.3em;
}

.title-page .date {
  font-size: 11pt;
  color: #555;
  margin-top: 0.3em;
}

.title-page .keywords {
  font-size: 9pt;
  margin-top: 2em;
  color: #444;
}

/* TOC styling */
.toc-section h2 {
  text-align: center;
  font-size: 14pt;
  border-bottom: none;
  margin-bottom: 1em;
}

.toc-section nav ul {
  list-style: none;
  padding-left: 0;
}

.toc-section nav ul ul {
  padding-left: 1.5em;
}

.toc-section nav li {
  margin-bottom: 0.3em;
  font-size: 10.5pt;
}

.toc-section nav a {
  color: #111;
  text-decoration: none;
}

/* Headings */
h1 {
  font-size: 16pt;
  text-align: center;
  margin-top: 0;
  margin-bottom: 0.3em;
  page-break-after: avoid;
}

h2 {
  font-size: 13pt;
  margin-top: 1.5em;
  margin-bottom: 0.5em;
  border-bottom: 1px solid #ccc;
  padding-bottom: 0.2em;
  page-break-after: avoid;
}

h3 {
  font-size: 11pt;
  font-weight: bold;
  margin-top: 1.2em;
  margin-bottom: 0.3em;
  page-break-after: avoid;
}

h4 {
  font-size: 11pt;
  font-weight: bold;
  font-style: italic;
  margin-top: 1em;
  margin-bottom: 0.3em;
  page-break-after: avoid;
}

/* Paragraphs */
p {
  margin-top: 0.4em;
  margin-bottom: 0.4em;
  text-align: justify;
  orphans: 3;
  widows: 3;
}

/* Tables */
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 9pt;
  margin: 0.8em 0;
  page-break-inside: avoid;
}

thead { display: table-header-group; }

th {
  background-color: #f0f0f0;
  font-weight: bold;
  text-align: left;
  padding: 4px 6px;
  border: 1px solid #999;
}

td {
  padding: 3px 6px;
  border: 1px solid #ccc;
  vertical-align: top;
}

tr:nth-child(even) { background-color: #fafafa; }

/* Code */
code {
  font-family: "Consolas", "Courier New", monospace;
  font-size: 9pt;
  background-color: #f5f5f5;
  padding: 1px 3px;
  border-radius: 2px;
}

pre {
  font-size: 8.5pt;
  background-color: #f5f5f5;
  border: 1px solid #ddd;
  padding: 8px 12px;
  overflow-x: auto;
  page-break-inside: avoid;
}

pre code {
  background-color: transparent;
  padding: 0;
}

/* Lists */
ul, ol {
  margin-top: 0.3em;
  margin-bottom: 0.3em;
  padding-left: 1.5em;
}

li { margin-bottom: 0.15em; }

/* Horizontal rules */
hr {
  border: none;
  border-top: 1px solid #ccc;
  margin: 1.5em 0;
}

/* Links */
a {
  color: #1a0dab;
  text-decoration: none;
}

/* Figures */
img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1em auto;
  page-break-inside: avoid;
}

figure {
  margin: 1.2em 0;
  page-break-inside: avoid;
}

figcaption {
  font-size: 9pt;
  font-style: italic;
  text-align: center;
  margin-top: 0.3em;
}

/* Print overrides */
@media print {
  body { padding: 0; }
  a { color: #111; text-decoration: none; }
  a[href]:after { content: none; }

  h2 { page-break-before: auto; }
  h1, h2, h3, h4 { page-break-after: avoid; }
  table, figure, pre { page-break-inside: avoid; }

  img {
    max-width: 6.5in;
    max-height: 4.5in;
    object-fit: contain;
  }

  .screen-only { display: none; }
}

/* Screen-only page number note */
.page-note {
  display: none;
}

@media screen {
  .title-page {
    border-bottom: 2px solid #ccc;
    padding-top: 1in;
    margin-bottom: 2em;
  }

  .toc-section {
    border-bottom: 2px solid #ccc;
    padding-bottom: 2em;
    margin-bottom: 2em;
  }
}
</style>
</head>
<body>

$body$

</body>
</html>
